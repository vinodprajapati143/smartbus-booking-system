<div class="min-h-screen flex flex-col">
  <nav class="bg-white border-b border-slate-200 sticky top-0 z-40 backdrop-blur-md bg-white/80">
    <div class="max-w-6xl mx-auto px-4 flex items-center justify-between h-20">
      <div class="flex items-center gap-3">
        <div
          class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg rotate-3 group-hover:rotate-0 transition-all">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        </div>
        <span class="text-xl font-black text-slate-800 tracking-tight">SmartBus <span
            class="text-indigo-600">Pro</span></span>
      </div>

      <div class="flex bg-slate-100 p-1.5 rounded-2xl gap-1">
        <a routerLink="/book" routerLinkActive="bg-white shadow-md text-indigo-600"
          [routerLinkActiveOptions]="{exact: true}"
          class="btn-mobile px-6 py-2.5 rounded-xl text-sm font-bold text-slate-500 hover:text-slate-800 transition-all flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
          </svg>
          New Booking
        </a>
        <a routerLink="/list" routerLinkActive="bg-white shadow-md text-indigo-600"
          class="btn-mobile px-6 py-2.5 rounded-xl text-sm font-bold text-slate-500 hover:text-slate-800 transition-all flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
          </svg>
          Boarding List
        </a>
      </div>
    </div>
  </nav>

  <main class="flex-grow">
    <router-outlet></router-outlet>
  </main>

  <footer class="bg-white border-t border-slate-100 py-10 mt-20">
    <div class="max-w-6xl mx-auto px-4 md:flex items-center justify-between text-slate-400 text-sm font-medium">
      <div class="mb-4 md:mb-0 text-center md:text-left">
        &copy; 2026 SmartBus Booking Systems.<br class="md:hidden"> All rights reserved.
      </div>
      <div class="flex gap-8 justify-center md:justify-end">
        <a href="#" class="hover:text-indigo-500 transition-colors">Privacy Policy</a>
        <a href="#" class="hover:text-indigo-500 transition-colors">Terms of Service</a>
        <a href="#" class="hover:text-indigo-500 transition-colors">Support</a>
      </div>
    </div>
  </footer>
</div>
